syntax = "proto3";

package com.triforge.protocol.proto;

option java_multiple_files = true;
option java_package = "com.triforge.protocol.proto";
option java_outer_classname = "EnvelopeProto";

message MessageEnvelope {
  string roomId = 1;
  uint64 tick = 2;

  uint64 msgId = 3;
  uint64 clientSeq = 4;
  uint64 serverSeq = 5;

  string schemaVersion = 6;

  bytes payload = 7;
}

message GameMessage {
  oneof content {
    JoinRequest joinRequest = 1;
    JoinResponse joinResponse = 2;
    FullSnapshot fullSnapshot = 3;
    DeltaSnapshot deltaSnapshot = 4;
    InputCommand inputCommand = 5;
    GameEvent gameEvent = 6;
    LobbyCommand lobbyCommand = 7;
    RoomLobbySnapshot roomLobbySnapshot = 8;
    MatchPhaseUpdate matchPhaseUpdate = 9;
    MatchResult matchResult = 10;
    MapSnapshot mapSnapshot = 11;
    TreasureQuestMessage tq = 12;
    LobbyCommandRejected lobbyCommandRejected = 13;
    ChatCommand chatCommand = 14;
    ChatMessage chatMessage = 15;
    OAnQuanMessage oaq = 16;
    BugMinerMessage bugminer = 17;
  }
}

// client → server: a chat message the player wants to send
message ChatCommand {
  string text = 1;
}

// server → all clients in room: an authoritative, stamped chat line
message ChatMessage {
  uint64 senderPlayerId = 1;  // 0 = system/server message
  string senderName = 2;
  string text = 3;
  uint64 tick = 4;
}

message JoinRequest {
  string playerName = 1;
}

message JoinResponse {
  uint64 playerId = 1;
  uint64 entityId = 2;
  FullSnapshot initialSnapshot = 3;
  MapSnapshot map = 4;
  RoomLobbySnapshot lobby = 5;
}

enum Direction {
  UP = 0;
  DOWN = 1;
  LEFT = 2;
  RIGHT = 3;
}

enum TileType {
  EMPTY = 0;
  BRICK = 1;
  STEEL = 2;
  WATER = 3;
  TREE = 4;
  WALL = 5;
  COVER = 6;
  HQ = 7;
}

enum FogCellState {
  UNKNOWN = 0;
  SEEN = 1;
  VISIBLE = 2;
}

message FogSnapshot {
  uint32 width = 1;
  uint32 height = 2;
  bytes cells = 3;
}

enum GameEventType {
  PLAYER_HIT = 0;
  PLAYER_DEATH = 1;
  PLAYER_RESPAWN = 2;
  MATCH_COUNTDOWN = 3;
  MATCH_STARTED = 4;
  MATCH_ENDED = 5;
  LOBBY_UPDATED = 6;
  HQ_DAMAGED = 7;
  HQ_DESTROYED = 8;
}

enum MatchPhase {
  LOBBY = 0;
  COUNTDOWN = 1;
  PLAYING = 2;
  ENDED = 3;
}

// Proto-level names are prefixed to stay unique across the file's enum namespace;
// the Java domain (Task 11) maps these to NONE / RED / BLUE.
enum Team {
  TEAM_NONE = 0;
  TEAM_RED = 1;
  TEAM_BLUE = 2;
}

enum SpawnRegion {
  REGION_UNSPECIFIED = 0;
  TOP_LEFT = 1;
  TOP_RIGHT = 2;
  BOTTOM_LEFT = 3;
  BOTTOM_RIGHT = 4;
}

message MapSnapshot {
  uint32 width = 1;
  uint32 height = 2;
  uint32 tileSize = 3;
  repeated TileType tiles = 4;
  repeated HeadquartersProto headquarters = 5;
  repeated float heights = 6;  // per-cell terrain elevation, row-major (empty = flat)
}

message HeadquartersProto {
  Team team = 1;
  uint32 x = 2;
  uint32 y = 3;
  uint32 width = 4;
  uint32 height = 5;
  uint32 maxHp = 6;
}

message TileChange {
  uint32 x = 1;
  uint32 y = 2;
  TileType tile = 3;
  float height = 4;  // new terrain elevation for this cell (destructible terrain)
}

message GameEvent {
  GameEventType type = 1;
  uint64 playerId = 2;
  uint64 entityId = 3;
  uint64 tick = 4;
  int32 livesRemaining = 5;
  Team team = 6;
  uint64 killerPlayerId = 7;
  repeated uint64 assistPlayerIds = 8;
}

message PlayerComponentProto {
  uint64 playerId = 1;
  string name = 2;
  int32 score = 3;
  int32 lives = 4;
  Team team = 5;
}

message PositionComponentProto {
  float x = 1;
  float y = 2;
  float z = 3;  // elevation (3D); 0 on legacy flat maps
}

message DirectionComponentProto {
  Direction direction = 1;
}

// 3D orientation: hull heading (yaw) + turret elevation (pitch), radians.
// Added alongside DirectionComponentProto during the 2D→3D parity window.
message OrientationComponentProto {
  float yaw = 1;
  float pitch = 2;
}

message TankComponentProto {
  float speed = 1;
  uint64 shootCooldownTicks = 2;
  uint64 cooldownRemainingTicks = 3;
}

message BulletComponentProto {
  uint64 ownerEntityId = 1;
  float speed = 2;
  float dx = 3;
  float dy = 4;
  float dz = 5;  // 3D velocity component (straight-line, no gravity)
}

message EntityProto {
  uint64 entityId = 1;
  PlayerComponentProto player = 2;
  PositionComponentProto position = 3;
  DirectionComponentProto direction = 4;
  TankComponentProto tank = 5;
  BulletComponentProto bullet = 6;
  QuestAvatarComponentProto questAvatar = 7;
  OrientationComponentProto orientation = 8;  // 3D hull yaw + turret pitch
}

message FullSnapshot {
  uint64 tick = 1;
  repeated EntityProto entities = 2;
  FogSnapshot fog = 3;
}

message DeltaSnapshot {
  uint64 tick = 1;
  repeated EntityProto updatedEntities = 2;
  repeated uint64 removedEntityIds = 3;
  repeated TileChange tileChanges = 4;
  FogSnapshot fog = 5;
}

message InputCommand {
  // Legacy 2D 4-way input (still read by the 2D server path / Phaser client).
  bool moveUp = 1;
  bool moveDown = 2;
  bool moveLeft = 3;
  bool moveRight = 4;
  bool shoot = 5;

  // 3D keyboard input: rotation *intent*, server accumulates yaw/pitch.
  bool moveForward = 6;
  bool moveBackward = 7;
  bool turnLeft = 8;    // rotate hull yaw left
  bool turnRight = 9;   // rotate hull yaw right
  bool aimUp = 10;      // raise turret pitch
  bool aimDown = 11;    // lower turret pitch
  bool lockTarget = 12; // hold to auto-steer the hull toward the nearest visible enemy
}

// ── Lobby & match flow ─────────────────────────────────────────────

message LobbyPlayer {
  uint64 playerId = 1;
  string displayName = 2;
  Team team = 3;
  SpawnRegion spawnRegion = 4;
  bool ready = 5;
  bool isHost = 6;
  bool isTeamCaptain = 7;
}

message TeamSetup {
  Team team = 1;
  uint64 captainPlayerId = 2;
  SpawnRegion spawnRegion = 3;
  SpawnRegion hqRegion = 4;
}

message RoomLobbySnapshot {
  string roomId = 1;
  string roomName = 2;
  MatchPhase phase = 3;
  repeated LobbyPlayer players = 4;
  uint32 minPlayers = 5;
  bool canStart = 6;
  repeated TeamSetup teamSetups = 7;
}

// Client → server lobby actions. All are no-ops outside the LOBBY phase.
message SetNameAction { string displayName = 1; }
message SetTeamAction { Team team = 1; }
message SetSpawnAction { SpawnRegion region = 1; }
message SetTeamSetupAction {
  SpawnRegion spawnRegion = 1;
  SpawnRegion hqRegion = 2;
}
message SetReadyAction { bool ready = 1; }
message StartMatchAction {}

message LobbyCommand {
  oneof action {
    SetNameAction setName = 1;
    SetTeamAction setTeam = 2;
    SetSpawnAction setSpawn = 3;
    SetReadyAction setReady = 4;
    StartMatchAction startMatch = 5;
    SetTeamSetupAction setTeamSetup = 6;
  }
}

enum LobbyRejectReason {
  LOBBY_REJECT_UNSPECIFIED = 0;
  NOT_IN_LOBBY_PHASE = 1;
  PLAYER_NOT_FOUND = 2;
  INVALID_NAME = 3;
  INVALID_TEAM = 4;
  TEAM_BALANCE = 5;
  NOT_ON_PLAYABLE_TEAM = 6;
  NOT_TEAM_CAPTAIN = 7;
  INVALID_SPAWN_REGION = 8;
  TEAM_SETUP_INCOMPLETE = 9;
}

message LobbyCommandRejected {
  uint64 playerId = 1;
  LobbyRejectReason reason = 2;
}

message MatchPhaseUpdate {
  MatchPhase phase = 1;
  uint32 countdownSeconds = 2;
  uint64 matchRemainingMs = 3;
  uint64 serverTick = 4;
  uint32 redHqHp = 5;
  uint32 blueHqHp = 6;
}

message PlayerMatchStats {
  uint64 playerId = 1;
  string displayName = 2;
  Team team = 3;
  uint32 kills = 4;
  uint32 deaths = 5;
  uint32 assists = 6;
  uint32 damageDealt = 7;
  uint32 damageTaken = 8;
  uint32 shotsFired = 9;
  uint32 shotsHit = 10;
}

message MatchResult {
  Team winningTeam = 1;
  uint32 redScore = 2;
  uint32 blueScore = 3;
  repeated PlayerMatchStats stats = 4;
  uint64 matchDurationMs = 5;
}

// ── TreasureQuest (2D in-world adventure + quiz) ────────────────────
// All game↔client messages for the treasurequest plugin ride GameMessage.tq.
// Spatial avatar state instead rides EntityProto.questAvatar via the snapshot path.
// Enum values are prefixed to stay unique in the file-level enum namespace.

enum ItemType {
  ITEM_NONE = 0;
  ITEM_SHIELD = 1;
  ITEM_SPEED = 2;
  ITEM_FAKE_MAP = 3;
  ITEM_TREASURE_LOCK = 4;
}

enum QuizOutcome {
  QUIZ_PENDING = 0;
  QUIZ_PASS = 1;
  QUIZ_FAIL = 2;
}

enum EncounterState {
  ENC_OFFERED = 0;
  ENC_ACCEPTED = 1;
  ENC_DECLINED = 2;
  ENC_CANCELLED = 3;
}

// Spatial avatar state, carried on EntityProto in full/delta snapshots.
message QuestAvatarComponentProto {
  uint64 playerId = 1;
  string name = 2;
  int32 score = 3;
  string currentCheckpoint = 4;      // current target checkpoint node id
  int32 checkpointsCleared = 5;
  bool shielded = 6;                  // immune to PvP (quiz-win shield)
  bool pvpCooldown = 7;              // cannot initiate PvP (post-win cooldown)
  bool stealImmune = 8;             // cannot be robbed (post-loss immunity)
  bool inDuel = 9;
}

message InventoryItemProto {
  ItemType item = 1;
  uint32 count = 2;
}

message QuizQuestionProto {
  string questionId = 1;
  string text = 2;
  repeated string options = 3;       // server NEVER sends the correct index
  uint32 timeLimitSec = 4;
  uint32 points = 5;
}

message QuizAnswer {
  string questionId = 1;
  int32 selectedIndex = 2;
}

// server → client: available next hint(s); branching gives multiple options
message HintReveal {
  string text = 1;
  repeated string nextCheckpointIds = 2;
  float x = 3;                        // optional map marker
  float y = 4;
}

// client → server: open the quiz at the current checkpoint zone
message InteractCommand {
  string checkpointId = 1;           // optional; server may infer from zone
}

// server → client: the quiz to solve at a checkpoint
message QuizPrompt {
  string quizId = 1;
  string checkpointId = 2;
  repeated QuizQuestionProto questions = 3;
  uint32 passThreshold = 4;
  uint64 deadlineTick = 5;
}

// client → server: submitted answers
message QuizSubmit {
  string quizId = 1;
  repeated QuizAnswer answers = 2;
}

// server → client: scored result
message QuizResult {
  string quizId = 1;
  QuizOutcome outcome = 2;
  uint32 correctCount = 3;
  uint32 totalQuestions = 4;
  int32 pointsEarned = 5;
  int32 totalScore = 6;
}

// server → both: a proximity encounter is available
message EncounterOffer {
  string encounterId = 1;
  uint64 opponentPlayerId = 2;
  string opponentName = 3;
  EncounterState state = 4;
  uint64 deadlineTick = 5;
}

// client → server: accept/decline a challenge
message ChallengeResponse {
  string encounterId = 1;
  bool accept = 2;
}

// server → both: the duel questions (5 Q / 30 s)
message DuelPrompt {
  string duelId = 1;
  uint64 opponentPlayerId = 2;
  string opponentName = 3;
  repeated QuizQuestionProto questions = 4;
  uint64 deadlineTick = 5;
}

// client → server: duel answers
message DuelSubmit {
  string duelId = 1;
  repeated QuizAnswer answers = 2;
}

// server → client: duel outcome (viewer-relative scoreDelta)
message DuelResult {
  string duelId = 1;
  uint64 winnerPlayerId = 2;
  bool tie = 3;
  uint32 yourCorrect = 4;
  uint32 opponentCorrect = 5;
  int32 scoreDelta = 6;              // signed, from the viewer's perspective
  int32 totalScore = 7;
}

// client → server: use an inventory item (target for Fake Map / Treasure Lock)
message ItemUse {
  ItemType item = 1;
  uint64 targetPlayerId = 2;         // 0 = self
}

// server → client: full inventory after a change
message InventoryUpdate {
  repeated InventoryItemProto items = 1;
}

message LeaderboardEntry {
  uint64 playerId = 1;
  string name = 2;
  int32 power = 3;
  int32 score = 4;
  int32 checkpointsCleared = 5;
  uint32 rank = 6;
}

// server → client: live standings (finalStandings=true on match end)
message Leaderboard {
  repeated LeaderboardEntry entries = 1;
  bool finalStandings = 2;
}

// server → client: first-to-treasure winner; match ends for all
message ExpeditionComplete {
  uint64 winnerPlayerId = 1;
  string winnerName = 2;
  bool youWon = 3;
}

// server → client: authoritative non-spatial state summary for the viewer
message PlayerStateUpdate {
  int32 score = 1;
  string currentCheckpoint = 2;
  int32 checkpointsCleared = 3;
  bool shielded = 4;
  bool pvpCooldown = 5;
  bool stealImmune = 6;
  repeated InventoryItemProto inventory = 7;
}

message TreasureQuestMessage {
  oneof content {
    InteractCommand interact = 1;
    HintReveal hintReveal = 2;
    QuizPrompt quizPrompt = 3;
    QuizSubmit quizSubmit = 4;
    QuizResult quizResult = 5;
    EncounterOffer encounterOffer = 6;
    ChallengeResponse challengeResponse = 7;
    DuelPrompt duelPrompt = 8;
    DuelSubmit duelSubmit = 9;
    DuelResult duelResult = 10;
    ItemUse itemUse = 11;
    InventoryUpdate inventoryUpdate = 12;
    Leaderboard leaderboard = 13;
    ExpeditionComplete expeditionComplete = 14;
    PlayerStateUpdate playerStateUpdate = 15;
  }
}

// ── Ô ăn quan (Vietnamese mancala) — plan-005 ──────────────────────
// Turn-based 2-player board game. The wire is 3D-agnostic: clients derive
// all rendering/animation from circular pit indices and the move trace.

enum OAQDirection {
  OAQ_DIR_UNSPECIFIED = 0;
  OAQ_CLOCKWISE = 1;         // increasing pit index (mod 12)
  OAQ_COUNTER_CLOCKWISE = 2; // decreasing pit index (mod 12)
}

enum OAQStepType {
  OAQ_STEP_UNSPECIFIED = 0;
  OAQ_PICKUP = 1;   // lift all stones from pitIndex into the mover's hand
  OAQ_SOW = 2;      // drop one stone from hand into pitIndex
  OAQ_CAPTURE = 3;  // pitIndex emptied into seat toSeat's tray (stones dân + quanPieces)
  OAQ_BORROW = 4;   // one stone moves from seat toSeat's tray into pitIndex (vay quân)
  OAQ_SWEEP = 5;    // endgame: pitIndex emptied into seat toSeat's tray (hết quan tàn dân)
}

// client → server: play (pitIndex, direction). Server validates and resolves.
message OAQMoveCommand {
  uint32 pitIndex = 1;
  OAQDirection direction = 2;
}

// server → sender only: the move was not applied.
message OAQMoveRejected {
  uint32 pitIndex = 1;
  OAQDirection direction = 2;
  string reason = 3;
}

message OAQScore {
  uint64 playerId = 1;
  uint32 seat = 2;          // 0 owns pits 0-4, 1 owns pits 6-10
  sint32 capturedDan = 3;   // may go negative under borrow debt
  uint32 capturedQuan = 4;
  sint32 points = 5;        // capturedDan + quanValue * capturedQuan
}

// server → all: authoritative board. Always wins over any in-flight animation.
message OAQBoardState {
  // 12 circular pits: 0-4 seat-0 dân row, 5 quan pit, 6-10 seat-1 dân row, 11 quan pit.
  repeated uint32 pitStones = 1;   // dân stones per pit (quan pits hold dân too)
  repeated uint32 quanPieces = 2;  // 2 entries: quan pieces remaining in pit 5, pit 11
  uint64 currentPlayerId = 3;
  repeated OAQScore scores = 4;
  uint32 turnTicksRemaining = 5;
  bool gameOver = 6;
  uint64 winnerPlayerId = 7;       // 0 = draw or not over
}

// server → all: ordered resolution trace of one applied move, for client animation.
message OAQStep {
  OAQStepType type = 1;
  uint32 pitIndex = 2;
  uint32 stones = 3;      // dân count involved (PICKUP total, SOW 1, CAPTURE/SWEEP dân)
  uint32 quanPieces = 4;  // quan pieces involved (CAPTURE/SWEEP from a quan pit)
  uint32 toSeat = 5;      // destination tray seat for CAPTURE/SWEEP; source tray for BORROW
}

message OAQMoveResult {
  uint64 playerId = 1;    // mover (server auto-move uses the current player's id)
  repeated OAQStep steps = 2;
}

message OAnQuanMessage {
  oneof content {
    OAQMoveCommand move = 1;
    OAQBoardState board = 2;
    OAQMoveResult moveResult = 3;
    OAQMoveRejected moveRejected = 4;
  }
}

// ── BugMiner (Dual Challenge Game) ───────────────────────────────────

enum BugMinerItemType {
  BM_ITEM_NONE = 0;
  BM_ITEM_GOLD = 1;
  BM_ITEM_BIG_GOLD = 2;
  BM_ITEM_DIAMOND = 3;
  BM_ITEM_ROCK = 4;
  BM_ITEM_MYSTERY_BAG = 5;
  BM_ITEM_POISON = 6;
  BM_ITEM_MOUSE = 7;
  BM_ITEM_PIG = 8;
  BM_ITEM_STRENGTH_DRINK = 9;
}

enum BugMinerHookState {
  BM_HOOK_RETRACTED = 0;
  BM_HOOK_SWINGING = 1;
  BM_HOOK_EXTENDING = 2;
  BM_HOOK_RETRACTING = 3;
}

message BugMinerPlacedItem {
  string id = 1;
  BugMinerItemType type = 2;
  float x = 3;
  float y = 4;
  bool collected = 5;
  float scale = 6;
}

message BugMinerHookData {
  float angle = 1;
  float length = 2;
  BugMinerHookState state = 3;
  string attachedItemId = 4;
  int32 swingDirection = 5;
}

message BugMinerChallengeState {
  uint64 designerId = 1;
  uint64 playerId = 2;
  string levelId = 3;
  uint32 timeLimit = 4;
  uint32 timeRemaining = 5;
  uint32 targetScore = 6;
  uint32 score = 7;
  repeated BugMinerPlacedItem items = 8;
  BugMinerHookData hook = 9;
  bool setupLocked = 10;
  bool finished = 11;
  string endReason = 12;
  uint32 strengthBuffRemaining = 13;
}

message BugMinerClientEvent {
  string event_type = 1;
  uint64 player_id = 2;
  uint64 player_a_id = 3;
  uint64 player_b_id = 4;
  uint64 thief_id = 5;
  uint64 victim_id = 6;
  string item_id = 7;
  int32 value = 8;
}

message BugMinerBoardState {
  BugMinerChallengeState forPlayerA = 1;
  BugMinerChallengeState forPlayerB = 2;
  BugMinerFairModeConfig fairMode = 3;
  BugMinerBattleState battle = 4;
  repeated BugMinerClientEvent events = 5;
  uint32 playCountdown = 6;
  bool paused = 7;
  optional uint64 winnerId = 8;
  string matchEndReason = 9;
}

message BugMinerFairModeConfig {
  bool enabled = 1;
  bool battle = 2;
  string levelId = 3;
  uint32 timeLimit = 4;
}

message BugMinerBattleState {
  string levelId = 1;
  uint32 timeLimit = 2;
  uint32 timeRemaining = 3;
  uint32 targetScore = 4;
  repeated BugMinerPlacedItem items = 5;
  uint64 playerAId = 6;
  uint64 playerBId = 7;
  BugMinerHookData hookA = 8;
  BugMinerHookData hookB = 9;
  uint32 scoreA = 10;
  uint32 scoreB = 11;
  bool finished = 12;
  uint64 winnerId = 13;
  string endReason = 14;
  uint32 strengthBuffA = 15;
  uint32 strengthBuffB = 16;
}

// Client Commands
message BMSetLevelCommand { string levelId = 1; }
message BMSetTimeLimitCommand { uint32 timeLimit = 1; }
message BMPlaceItemCommand {
  string itemId = 1;
  float x = 2;
  float y = 3;
}
message BMAutoArrangeCommand {}
message BMLockMapCommand {}
message BMFireHookCommand {}
message BMConfigureFairModeCommand {
  optional bool enabled = 1;
  optional bool battle = 2;
  optional string levelId = 3;
  optional uint32 timeLimit = 4;
}
message BMPauseCommand { bool paused = 1; }
message BMRestartCommand {}

message BugMinerMessage {
  oneof content {
    BMSetLevelCommand setLevel = 1;
    BMSetTimeLimitCommand setTimeLimit = 2;
    BMPlaceItemCommand placeItem = 3;
    BMAutoArrangeCommand autoArrange = 4;
    BMLockMapCommand lockMap = 5;
    BMFireHookCommand fireHook = 6;
    BugMinerBoardState board = 7;
    BMConfigureFairModeCommand configureFairMode = 8;
    BMPauseCommand pause = 9;
    BMRestartCommand restart = 10;
  }
}
