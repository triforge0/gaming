<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bé Xếp Hình Khám Phá Thế Giới</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-sky-1:#EAF6FF;
    --bg-sky-2:#CDEBFF;
    --ink:#2B3A4A;
    --ink-soft:#5C7085;
    --sun:#FFC93C;
    --sun-dark:#E8A825;
    --white:#FFFFFF;

    --history:#C97B4A;
    --history-light:#F3DCC8;
    --geo:#2EA8A0;
    --geo-light:#D7F3F0;
    --nature:#4CAF6D;
    --nature-light:#DFF3E3;
    --animals:#FF7A5C;
    --animals-light:#FFE1D6;

    --shadow:0 8px 20px rgba(43,58,74,0.12);
    --shadow-sm:0 4px 10px rgba(43,58,74,0.10);
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, #ffffff 0%, transparent 40%),
      radial-gradient(circle at 85% 5%, #ffffff 0%, transparent 35%),
      linear-gradient(180deg, var(--bg-sky-1) 0%, var(--bg-sky-2) 100%);
    overflow-x:hidden;
    position:relative;
  }
  .cloud{
    position:absolute; background:#fff; border-radius:100px; opacity:.8; filter:blur(0.5px);
    box-shadow: 40px 0 0 -6px #fff, -40px 0 0 -6px #fff, 20px -14px 0 -2px #fff, -20px -14px 0 -2px #fff;
  }
  h1,h2,h3,.display{ font-family:'Baloo 2', cursive; }

  .app{ max-width:520px; margin:0 auto; padding:20px 18px 60px; position:relative; z-index:1; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand h1{ font-size:22px; margin:0; color:var(--ink); }
  .switch-link{
    background:none; border:none; color:var(--ink-soft); font-family:'Nunito'; font-weight:700;
    font-size:13px; cursor:pointer; text-decoration:underline; padding:6px;
  }

  .screen{ display:none; animation: fadeIn .35s ease; }
  .screen.active{ display:block; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Card base ---------- */
  .card{
    background:var(--white); border-radius:var(--radius-lg); box-shadow:var(--shadow);
    padding:24px 22px;
  }

  /* ---------- Profile screen ---------- */
  .owl-wrap{ display:flex; justify-content:center; margin-bottom:6px; }
  .speech{
    background:var(--white); border-radius:20px; padding:12px 18px; box-shadow:var(--shadow-sm);
    font-weight:700; text-align:center; margin:10px auto 22px; max-width:340px; position:relative;
    font-size:15px; color:var(--ink);
  }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-weight:800; margin-bottom:8px; font-size:15px; }
  .field input{
    width:100%; padding:14px 16px; border-radius:var(--radius-md); border:2px solid #E4EEF5;
    font-family:'Nunito'; font-size:16px; font-weight:700; color:var(--ink); background:#F8FBFD;
  }
  .field input:focus{ outline:none; border-color:var(--sun); background:#fff; }

  .tier-options{ display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .tier-btn{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:14px 16px; border-radius:var(--radius-md); border:2px solid #E4EEF5; background:#F8FBFD;
    cursor:pointer; font-family:'Nunito'; font-weight:800; font-size:14.5px; color:var(--ink); text-align:left;
  }
  .tier-btn .tag{ font-size:11px; font-weight:800; padding:4px 9px; border-radius:100px; background:var(--sun); color:#5A3F00; }
  .tier-btn.selected{ border-color:var(--sun-dark); background:#FFF7E6; }

  .btn-primary{
    width:100%; padding:16px; border:none; border-radius:100px; background:var(--sun);
    color:#5A3F00; font-family:'Baloo 2'; font-weight:700; font-size:18px; cursor:pointer;
    box-shadow:0 6px 0 var(--sun-dark); transition:transform .08s;
  }
  .btn-primary:active{ transform:translateY(4px); box-shadow:0 2px 0 var(--sun-dark); }
  .btn-secondary{
    width:100%; padding:14px; border:2px solid #E4EEF5; border-radius:100px; background:#fff;
    color:var(--ink); font-family:'Baloo 2'; font-weight:700; font-size:16px; cursor:pointer; margin-top:10px;
  }

  /* ---------- Home screen ---------- */
  .hero-banner{
    position:relative; border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow);
    margin-bottom:16px; height:110px;
  }
  .hero-banner svg{ width:100%; height:100%; display:block; }
  .hero-owl{ position:absolute; bottom:-6px; right:16px; width:64px; height:64px; }

  .welcome{ margin-bottom:18px; }
  .welcome h2{ margin:0 0 4px; font-size:24px; }
  .welcome p{ margin:0; color:var(--ink-soft); font-weight:700; font-size:14px; }
  .stars-total{
    display:inline-flex; align-items:center; gap:6px; margin-top:10px; background:#FFF7E6;
    padding:8px 14px; border-radius:100px; font-weight:800; color:#8A6200; font-size:14px;
  }

  .theme-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .theme-card{
    border-radius:var(--radius-md); padding:18px 14px; cursor:pointer; border:none;
    display:flex; flex-direction:column; align-items:flex-start; gap:8px; box-shadow:var(--shadow-sm);
    font-family:'Nunito'; text-align:left; transition:transform .12s;
  }
  .theme-card:active{ transform:scale(0.97); }
  .theme-card .icon-badge{
    width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.65); box-shadow:inset 0 0 0 3px rgba(255,255,255,0.9);
  }
  .theme-card .icon-badge svg{ width:36px; height:36px; }
  .star-row{ display:inline-flex; gap:2px; vertical-align:middle; }
  .star-row svg{ width:16px; height:16px; }
  .theme-card h3{ margin:0; font-size:17px; color:var(--ink); }
  .theme-card .progress-txt{ font-size:12.5px; font-weight:800; opacity:.75; }

  .theme-history{ background:var(--history-light); }
  .theme-geo{ background:var(--geo-light); }
  .theme-nature{ background:var(--nature-light); }
  .theme-animals{ background:var(--animals-light); }

  /* ---------- Theme / puzzle list screen ---------- */
  .back-row{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }
  .back-btn{
    width:38px; height:38px; border-radius:50%; border:none; background:#fff; box-shadow:var(--shadow-sm);
    cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
  }
  .theme-title{ font-size:22px; margin:0; }

  .puzzle-list{ display:flex; flex-direction:column; gap:14px; }
  .puzzle-item{
    display:flex; align-items:center; gap:14px; background:#fff; border-radius:var(--radius-md);
    padding:12px; box-shadow:var(--shadow-sm); cursor:pointer; border:none; text-align:left; width:100%;
    font-family:'Nunito';
  }
  .puzzle-thumb{
    width:64px; height:64px; border-radius:14px; overflow:hidden; flex-shrink:0; background:#eee;
  }
  .puzzle-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .puzzle-info{ flex:1; }
  .puzzle-info h4{ margin:0 0 4px; font-size:16px; }
  .puzzle-info .stars{ font-size:14px; letter-spacing:2px; }
  .puzzle-info .diff{ font-size:11.5px; color:var(--ink-soft); font-weight:800; }

  /* ---------- Puzzle screen ---------- */
  .puzzle-header{ text-align:center; margin-bottom:14px; }
  .puzzle-header h3{ margin:0 0 4px; font-size:20px; }
  .puzzle-header p{ margin:0; color:var(--ink-soft); font-weight:700; font-size:13px; }

  .board-wrap{
    background:#fff; border-radius:var(--radius-lg); padding:10px; box-shadow:var(--shadow); margin:0 auto 18px;
    max-width:380px;
  }
  .board{
    display:grid; gap:4px; aspect-ratio:1/1; border-radius:16px; overflow:hidden;
  }
  .piece{
    background-repeat:no-repeat; cursor:pointer; border-radius:6px;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,0.55);
    transition:transform .12s, box-shadow .12s;
  }
  .piece:hover{ transform:scale(0.98); }
  .piece.selected{ box-shadow:inset 0 0 0 4px var(--sun-dark); transform:scale(0.93); z-index:2; }

  .hint-row{ text-align:center; color:var(--ink-soft); font-weight:700; font-size:13px; margin-top:-6px; margin-bottom:8px;}

  /* ---------- Overlay (complete) ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(43,58,74,0.55); display:none;
    align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.active{ display:flex; }
  .sheet{
    background:#fff; width:100%; max-width:520px; border-radius:26px 26px 0 0; padding:26px 22px 30px;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp{ from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;} }
  .sheet h3{ text-align:center; margin:6px 0 10px; font-size:22px; }
  .fact-box{
    background:#FFF7E6; border-radius:var(--radius-md); padding:14px 16px; font-weight:700; font-size:14.5px;
    text-align:center; margin-bottom:18px; color:#6B4E00;
  }
  .quiz-q{ font-weight:800; text-align:center; margin-bottom:14px; font-size:15.5px; }
  .quiz-options{ display:flex; flex-direction:column; gap:10px; margin-bottom:6px; }
  .quiz-opt{
    padding:14px; border-radius:var(--radius-md); border:2px solid #E4EEF5; background:#F8FBFD;
    font-family:'Nunito'; font-weight:800; font-size:14.5px; cursor:pointer; text-align:left;
  }
  .quiz-opt.correct{ border-color:#4CAF6D; background:#E4F7E9; color:#276B3E; }
  .quiz-opt.wrong{ border-color:#FF7A5C; background:#FFE9E3; color:#9C3A20; }
  .quiz-feedback{ text-align:center; font-weight:800; margin:10px 0; font-size:14.5px; min-height:20px; }

  .confetti-emoji{ font-size:34px; text-align:center; margin-bottom:6px; }

  .diff-picker{ display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
  .diff-chip{
    padding:8px 12px; border-radius:16px; border:2px solid #E4EEF5; background:#F8FBFD;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .diff-chip.active{ border-color:var(--sun-dark); background:#FFF7E6; }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<div class="cloud" style="width:60px;height:24px;top:40px;left:20px;"></div>
<div class="cloud" style="width:80px;height:30px;top:90px;right:10px;"></div>

<div class="app">

  <div class="topbar">
    <div class="brand">
      <svg width="36" height="36" viewBox="0 0 60 60">
        <path d="M8 8h16v6a5 5 0 0 0 10 0V8h18v16h-6a5 5 0 0 0 0 10h6v18H24v-6a5 5 0 0 0-10 0v6H8V34h6a5 5 0 0 0 0-10H8Z"
          fill="#FFC93C" stroke="#E8A825" stroke-width="2.5" stroke-linejoin="round"/>
      </svg>
      <h1>Bé Xếp Hình</h1>
    </div>
    <button class="switch-link hidden" id="switchProfileBtn">Đổi hồ sơ</button>
  </div>

  <!-- ============ SCREEN: PROFILE ============ -->
  <section class="screen" id="screen-profile">
    <div class="owl-wrap" id="owlProfile"></div>
    <div class="speech">Xin chào bạn nhỏ! Cho mình biết tên và tuổi để chọn độ khó phù hợp nhé 🦉</div>
    <div class="card">
      <div class="field">
        <label for="inputName">Tên của bé</label>
        <input type="text" id="inputName" placeholder="Ví dụ: Bi" maxlength="20">
      </div>
      <div class="field">
        <label for="inputAge">Tuổi</label>
        <input type="number" id="inputAge" placeholder="Ví dụ: 6" min="2" max="14">
      </div>
      <div class="field">
        <label>Độ khó (hệ thống gợi ý sẵn, bé có thể đổi)</label>
        <div class="tier-options" id="tierOptions"></div>
      </div>
      <button class="btn-primary" id="startBtn">Bắt đầu chơi 🚀</button>
    </div>
  </section>

  <!-- ============ SCREEN: HOME ============ -->
  <section class="screen" id="screen-home">
    <div class="hero-banner">
      <svg viewBox="0 0 500 160" preserveAspectRatio="none">
        <rect width="500" height="160" fill="#BFE6FA"/>
        <circle cx="430" cy="40" r="30" fill="#FFC93C"/>
        <ellipse cx="60" cy="35" rx="30" ry="13" fill="#fff"/>
        <ellipse cx="110" cy="25" rx="20" ry="9" fill="#fff"/>
        <path d="M0 130 Q60 95 130 120 T260 110 T500 125 V160 H0 Z" fill="#8FBF6A"/>
        <path d="M0 145 Q80 120 170 140 T500 140 V160 H0 Z" fill="#7BAE58"/>
        <circle cx="360" cy="118" r="26" fill="#4CAF6D"/>
        <circle cx="330" cy="128" r="20" fill="#3E9A5C"/>
        <rect x="356" y="128" width="8" height="24" fill="#8A5A34"/>
      </svg>
      <div class="hero-owl" id="homeOwl"></div>
    </div>
    <div class="welcome">
      <h2 id="welcomeText">Xin chào!</h2>
      <p>Chọn một chủ đề để bắt đầu ghép hình nhé</p>
      <div class="stars-total" id="starsTotal"></div>
    </div>
    <div class="theme-grid" id="themeGrid"></div>
  </section>

  <!-- ============ SCREEN: PUZZLE LIST ============ -->
  <section class="screen" id="screen-list">
    <div class="back-row">
      <button class="back-btn" id="backToHome">←</button>
      <h2 class="theme-title" id="listTitle">Chủ đề</h2>
    </div>
    <div class="puzzle-list" id="puzzleList"></div>
  </section>

  <!-- ============ SCREEN: PUZZLE PLAY ============ -->
  <section class="screen" id="screen-puzzle">
    <div class="back-row">
      <button class="back-btn" id="backToList">←</button>
      <h2 class="theme-title" id="puzzleTitle">Ghép hình</h2>
    </div>
    <div class="diff-picker" id="diffPicker"></div>
    <div class="puzzle-header">
      <p>Chạm vào 2 ô để đổi chỗ cho nhau, ghép đúng vị trí nhé!</p>
    </div>
    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>
    <div class="hint-row" id="movesHint">0 lần đổi chỗ</div>
  </section>

</div>

<!-- ============ OVERLAY: COMPLETE + FACT + QUIZ ============ -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="confetti-emoji" id="stepIcon">
      <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
        <span style="font-size:34px;">🎉</span>
        <span id="overlayOwl"></span>
        <span style="font-size:34px;">🎉</span>
      </div>
    </div>
    <h3 id="stepTitle">Bé ghép đúng rồi!</h3>

    <div id="factStep">
      <div class="fact-box" id="factText"></div>
      <button class="btn-primary" id="toQuizBtn">Xem câu hỏi vui →</button>
    </div>

    <div id="quizStep" class="hidden">
      <div class="quiz-q" id="quizQ"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="btn-primary hidden" id="finishBtn">Tiếp tục</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const TIERS = {
  easy:   { label:'Dễ',        cols:2, rows:2, pieces:4,  ageHint:'3–5 tuổi' },
  medium: { label:'Trung bình',cols:3, rows:3, pieces:9,  ageHint:'6–8 tuổi' },
  hard:   { label:'Khó',       cols:4, rows:4, pieces:16, ageHint:'9–12 tuổi' },
};

function suggestTier(age){
  if(age <= 5) return 'easy';
  if(age <= 8) return 'medium';
  return 'hard';
}

// Simple flat-illustration SVG bodies (inner markup only), viewBox 0 0 400 400
function sunflower(cx, cy, s){
  return `
    <ellipse cx="${cx}" cy="${cy-14*s}" rx="${6*s}" ry="${10*s}" fill="#FFC93C"/>
    <ellipse cx="${cx}" cy="${cy+14*s}" rx="${6*s}" ry="${10*s}" fill="#FFC93C"/>
    <ellipse cx="${cx-14*s}" cy="${cy}" rx="${10*s}" ry="${6*s}" fill="#FFC93C"/>
    <ellipse cx="${cx+14*s}" cy="${cy}" rx="${10*s}" ry="${6*s}" fill="#FFC93C"/>
    <circle cx="${cx}" cy="${cy}" r="${9*s}" fill="#8A5A34"/>
    <rect x="${cx-2}" y="${cy+9*s}" width="4" height="${50*s}" fill="#4CAF6D"/>
  `;
}

  `,

    <rect width="400" height="400" fill="#CFEFFF"/>

  `,
  rainforest: `

  waterfall: `
    <rect width="400" height="400" fill="#BFE6FA"/>

    <ellipse cx="190" cy="335" rx="90" ry="30" fill="#BFE0EC"/>

function starRow(filled, total){
  const svgStar = (isFilled) => `<svg viewBox="0 0 24 24"><polygon points="12,2 15,9 22,9.5 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9.5 9,9"
      fill="${isFilled ? '#FFC93C' : 'none'}" stroke="${isFilled ? '#E8A825' : '#C9D3DA'}" stroke-width="1.5"/></svg>`;
  let out = '<span class="star-row">';
  for(let i=0;i<total;i++) out += svgStar(i<filled);
  out += '</span>';
  return out;
}

function gridIcon(cols, rows, color){
  const cell = 40/Math.max(cols,rows);
  let rects = '';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      rects += `<rect x="${c*cell+2}" y="${r*cell+2}" width="${cell-3}" height="${cell-3}" rx="2" fill="${color}"/>`;
    }
  }
  return `<svg viewBox="0 0 44 44" width="28" height="28">${rects}</svg>`;
}

async function loadProgress(){
  try{
    const res = await window.storage.get('progress', false);
    return res ? JSON.parse(res.value) : {};
  }catch(e){ return {}; }
}
async function saveProgress(){
  try{ await window.storage.set('progress', JSON.stringify(progress), false); }catch(e){ console.error(e); }
}
async function clearAll(){
  try{ await window.storage.delete('profile', false); }catch(e){}
  try{ await window.storage.delete('progress', false); }catch(e){}
}

/* ============================================================
   OWL MASCOT (small svg)
   ============================================================ */
function owlSvg(size){
  return `<svg width="${size}" height="${size}" viewBox="0 0 120 120">
    <ellipse cx="60" cy="70" rx="42" ry="40" fill="#B98A5A"/>
    <ellipse cx="60" cy="65" rx="34" ry="32" fill="#E8C79A"/>
    <polygon points="30,35 42,55 20,55" fill="#B98A5A"/>
    <polygon points="90,35 100,55 78,55" fill="#B98A5A"/>
    <circle cx="44" cy="62" r="14" fill="#fff"/>
    <circle cx="76" cy="62" r="14" fill="#fff"/>
    <circle cx="44" cy="62" r="7" fill="#2B3A4A"/>
    <circle cx="76" cy="62" r="7" fill="#2B3A4A"/>
    <polygon points="60,72 52,84 68,84" fill="#E8A23C"/>
    <ellipse cx="60" cy="108" rx="16" ry="7" fill="#D9A85C"/>
  </svg>`;
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============================================================
   INIT
   ============================================================ */
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('owlProfile').innerHTML = owlSvg(100);
  renderTierOptions(null);

  profile = await loadProfile();
  progress = await loadProgress();

  if(profile){
    document.getElementById('switchProfileBtn').classList.remove('hidden');
    goHome();
  } else {
    showScreen('screen-profile');
  }

  bindEvents();
});

function renderTierOptions(suggested){
  const wrap = document.getElementById('tierOptions');
  wrap.innerHTML = '';
  Object.entries(TIERS).forEach(([key, t]) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'tier-btn' + (key === (currentTier) ? ' selected' : '');
    btn.dataset.tier = key;
    btn.innerHTML = `<span>${t.label} · ${t.pieces} mảnh</span>` + (key===suggested ? `<span class="tag">Đề xuất</span>` : '');
    btn.addEventListener('click', () => {
      currentTier = key;
      document.querySelectorAll('.tier-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    });
    wrap.appendChild(btn);
  });
}

function bindEvents(){
  document.getElementById('inputAge').addEventListener('input', (e) => {
    const age = parseInt(e.target.value, 10);
    if(!isNaN(age) && age > 0){
      currentTier = suggestTier(age);
      renderTierOptions(currentTier);
    }
  });

  document.getElementById('startBtn').addEventListener('click', async () => {
    const name = document.getElementById('inputName').value.trim() || 'Bạn nhỏ';
    const age = parseInt(document.getElementById('inputAge').value, 10) || 6;
    profile = { name, age, tier: currentTier };
    await saveProfile(profile);
    document.getElementById('switchProfileBtn').classList.remove('hidden');
    goHome();
  });

  document.getElementById('switchProfileBtn').addEventListener('click', async () => {
    if(confirm('Đổi hồ sơ sẽ giữ lại tiến trình đã lưu, nhưng bé sẽ nhập lại tên/tuổi. Tiếp tục?')){
      profile = null;
      showScreen('screen-profile');
      document.getElementById('inputName').value = '';
      document.getElementById('inputAge').value = '';
      renderTierOptions(null);
    }
  });

  document.getElementById('backToHome').addEventListener('click', goHome);
  document.getElementById('backToList').addEventListener('click', () => openThemeList(currentThemeId));

  document.getElementById('toQuizBtn').addEventListener('click', showQuizStep);
  document.getElementById('finishBtn').addEventListener('click', closeOverlayAndRefresh);
}

/* ============================================================
   HOME
   ============================================================ */
function goHome(){
  document.getElementById('welcomeText').textContent = `Xin chào, ${profile.name}! 👋`;
  const totalStars = Object.values(progress).reduce((s,p)=>s+(p.stars||0),0);
  const starIconFilled = `<svg viewBox="0 0 24 24" width="18" height="18" style="vertical-align:-3px;"><polygon points="12,2 15,9 22,9.5 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9.5 9,9" fill="#FFC93C" stroke="#E8A825" stroke-width="1.5"/></svg>`;
  document.getElementById('starsTotal').innerHTML = `${starIconFilled} ${totalStars} sao`;
  document.getElementById('homeOwl').innerHTML = owlSvg(64);

  const grid = document.getElementById('themeGrid');
  grid.innerHTML = '';
  THEMES.forEach(theme => {
    const done = theme.puzzles.filter(p => progress[p.id]).length;
    const card = document.createElement('button');
    card.className = `theme-card ${theme.cls}`;
    card.innerHTML = `
      <div class="icon-badge">${ICONS[theme.id]}</div>
      <h3>${theme.name}</h3>
      <div class="progress-txt">${starRow(done, theme.puzzles.length)}</div>
    `;
    card.addEventListener('click', () => openThemeList(theme.id));
    grid.appendChild(card);
  });

  showScreen('screen-home');
}

/* ============================================================
   THEME PUZZLE LIST
   ============================================================ */
function openThemeList(themeId){
  currentThemeId = themeId;
  const theme = THEMES.find(t => t.id === themeId);
  document.getElementById('listTitle').textContent = theme.name;

  const list = document.getElementById('puzzleList');
  list.innerHTML = '';
  theme.puzzles.forEach(p => {
    const stars = progress[p.id]?.stars || 0;
    const dataUri = svgToDataUri(p.art);
    const item = document.createElement('button');
    item.className = 'puzzle-item';
    const t = TIERS[profile.tier];
    item.innerHTML = `
      <div class="puzzle-thumb" style="border:3px solid ${theme.color};"><img src="${dataUri}" alt=""></div>
      <div class="puzzle-info">
        <h4>${p.title}</h4>
        <div class="stars">${starRow(stars, 2)}</div>
        <div class="diff">${gridIcon(t.cols, t.rows, theme.color)}</div>
      </div>
    `;
    item.addEventListener('click', () => openPuzzle(theme, p));
    list.appendChild(item);
  });

  showScreen('screen-list');
}

function svgToDataUri(inner){
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">${inner}</svg>`;
  return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
}

/* ============================================================
   PUZZLE PLAY
   ============================================================ */
let moveCount = 0;

function openPuzzle(theme, puzzle){
  currentPuzzle = { theme, puzzle };
  document.getElementById('puzzleTitle').textContent = puzzle.title;
  renderDiffPicker();
  buildBoard(profile.tier);
  showScreen('screen-puzzle');
}

function renderDiffPicker(){
  const wrap = document.getElementById('diffPicker');
  wrap.innerHTML = '';
  Object.entries(TIERS).forEach(([key,t]) => {
    const chip = document.createElement('button');
    chip.className = 'diff-chip' + (key===profile.tier ? ' active' : '');
    chip.innerHTML = `${gridIcon(t.cols, t.rows, key===profile.tier ? '#E8A825' : '#B9C6CE')}`;
    chip.addEventListener('click', () => {
      profile.tier = key;
      saveProfile(profile);
      renderDiffPicker();
      buildBoard(key);
    });
    wrap.appendChild(chip);
  });
}

function buildBoard(tierKey){
  const tier = TIERS[tierKey];
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${tier.cols}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${tier.rows}, 1fr)`;
  board.innerHTML = '';
  selectedPiece = null;
  moveCount = 0;
  document.getElementById('movesHint').textContent = '0 lần đổi chỗ';

  const dataUri = svgToDataUri(currentPuzzle.puzzle.art);
  const total = tier.cols * tier.rows;
  let order = [...Array(total).keys()];
  shuffleUntilMixed(order);

  order.forEach(correctIndex => {
    const piece = document.createElement('div');
    piece.className = 'piece';
    piece.dataset.correct = correctIndex;
    const col = correctIndex % tier.cols;
    const row = Math.floor(correctIndex / tier.cols);
    piece.style.backgroundImage = `url("${dataUri}")`;
    piece.style.backgroundSize = `${tier.cols * 100}% ${tier.rows * 100}%`;
    piece.style.backgroundPosition =
      `${tier.cols === 1 ? 0 : (col/(tier.cols-1))*100}% ${tier.rows === 1 ? 0 : (row/(tier.rows-1))*100}%`;
    piece.addEventListener('click', () => onPieceClick(piece));
    board.appendChild(piece);
  });
}

function shuffleUntilMixed(arr){
  const isSolved = a => a.every((v,i) => v === i);
  do {
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  } while(isSolved(arr) && arr.length > 1);
}

function onPieceClick(piece){
  if(selectedPiece === piece){
    piece.classList.remove('selected');
    selectedPiece = null;
    return;
  }
  if(!selectedPiece){
    selectedPiece = piece;
    piece.classList.add('selected');
    return;
  }
  swapDom(selectedPiece, piece);
  selectedPiece.classList.remove('selected');
  selectedPiece = null;
  moveCount++;
  document.getElementById('movesHint').textContent = `${moveCount} lần đổi chỗ`;
  checkSolved();
}

function swapDom(a, b){
  const parent = a.parentNode;
  const aNext = a.nextSibling === b ? a : a.nextSibling;
  parent.insertBefore(a, b);
  parent.insertBefore(b, aNext);
}

function checkSolved(){
  const pieces = [...document.getElementById('board').children];
  const solved = pieces.every((p, i) => Number(p.dataset.correct) === i);
  if(solved){
    setTimeout(() => openCompleteOverlay(), 250);
  }
}

/* ============================================================
   COMPLETE OVERLAY: FACT -> QUIZ -> STARS
   ============================================================ */
function openCompleteOverlay(){
  quizAnsweredCorrectly = false;
  quizAttempts = 0;

  document.getElementById('factStep').classList.remove('hidden');
  document.getElementById('quizStep').classList.add('hidden');
  document.getElementById('finishBtn').classList.add('hidden');
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('stepTitle').textContent = 'Bé ghép đúng rồi! 🎉';
  document.getElementById('factText').textContent = currentPuzzle.puzzle.fact;
  document.getElementById('overlayOwl').innerHTML = owlSvg(50);

  document.getElementById('overlay').classList.add('active');
}

function showQuizStep(){
  document.getElementById('factStep').classList.add('hidden');
  document.getElementById('quizStep').classList.remove('hidden');

  const quiz = currentPuzzle.puzzle.quiz;
  document.getElementById('quizQ').textContent = quiz.q;
  const optWrap = document.getElementById('quizOptions');
  optWrap.innerHTML = '';

  // shuffle displayed order, keep track of correct text
  const correctText = quiz.options[quiz.correct];
  const shuffled = [...quiz.options];
  for(let i = shuffled.length -1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.forEach(optText => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = optText;
    btn.addEventListener('click', () => handleQuizAnswer(btn, optText === correctText));
    optWrap.appendChild(btn);
  });
}

function handleQuizAnswer(btn, isCorrect){
  if(quizAnsweredCorrectly) return;
  quizAttempts++;
  const allBtns = document.querySelectorAll('.quiz-opt');

  if(isCorrect){
    quizAnsweredCorrectly = true;
    btn.classList.add('correct');
    allBtns.forEach(b => b.disabled = true);
    document.getElementById('quizFeedback').textContent =
      quizAttempts === 1 ? 'Chính xác! Bé giỏi quá! ⭐⭐' : 'Đúng rồi! Cố lên nào ⭐';
    awardStars(quizAttempts === 1 ? 2 : 1);
    document.getElementById('finishBtn').classList.remove('hidden');
  } else {
    btn.classList.add('wrong');
    btn.disabled = true;
    document.getElementById('quizFeedback').textContent = 'Chưa đúng, bé thử lại nhé!';
  }
}

async function awardStars(stars){
  const pid = currentPuzzle.puzzle.id;
  const existing = progress[pid]?.stars || 0;
  progress[pid] = { stars: Math.max(existing, stars) };
  await saveProgress();
}

function closeOverlayAndRefresh(){
  document.getElementById('overlay').classList.remove('active');
  openThemeList(currentThemeId);
}
</script>
