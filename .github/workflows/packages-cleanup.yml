name: Packages Cleanup

on:
  workflow_dispatch:
    inputs:
      min_versions_to_keep:
        description: "Number of most recent versions to keep"
        required: false
        default: "5"
  schedule:
    - cron: "0 2 * * *" # Every day at 02:00 UTC

jobs:
  cleanup-untagged:
    name: Delete untagged versions
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete untagged container versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: "gaming"
          package-type: "container"
          min-versions-to-keep: 0
          delete-only-untagged-versions: "true"
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup-old-sha:
    name: Keep only N most recent sha - tagged versions
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old sha- versions (keep latest N, ignore 'latest' tag)
        uses: actions/delete-package-versions@v5
        with:
          package-name: "gaming"
          package-type: "container"
          min-versions-to-keep: ${{ github.event.inputs.min_versions_to_keep || 5 }}
          ignore-versions: "^latest$"
          token: ${{ secrets.GITHUB_TOKEN }}
