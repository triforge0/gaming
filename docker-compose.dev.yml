# Build and run from local source (includes unmerged bugminer changes).
# Requires Docker Desktop running.
#
#   docker compose -f docker-compose.dev.yml up --build -d
#   → http://localhost:8080/games/bugminer/
services:
  triforge-server:
    build: .
    image: triforge-gaming:local
    container_name: triforge-server-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_UDPDISCOVERY: "false"
